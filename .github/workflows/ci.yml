name: Test bindings

on:
  push:
    paths:
      - 'vapi/**'
      - 'python/**'
      - 'python-swig/**'
      - 'dlang/**'
      - 'rust/**'
      - 'go/**'
      - 'node-ffi/**'
      - 'configure'
      - 'Makefile'
  pull_request:
    paths:
      - 'vapi/**'
      - 'python/**'
      - 'python-swig/**'
      - 'dlang/**'
      - 'rust/**'
      - 'go/**'
      - 'node-ffi/**'
      - 'configure'
      - 'Makefile'
  workflow_dispatch:

jobs:
  vala:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install r2
      uses: radareorg/github-actions@v1
    - name: Install vala
      run: sudo apt install -y valac
    - name: Build and run some tests
      run: |
        ./configure --prefix=/usr
        sudo make -C vapi install
        make -C vapi/t
  swig-python:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install r2
      uses: radareorg/github-actions@v1
    - name: Install valabind and swig
      run: |
        sudo apt install -y swig valac libvala-dev
        r2pm -Uci valabind
    - name: Configure
      run: ./configure
    - name: Test valabind
      run: r2pm -r valabind --version
    - name: Build swig bindings
      run: r2pm -r make -C python
    - name: Build dlang bindings
      run: r2pm -r make -C dlang
  python-swig:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install r2
      uses: radareorg/github-actions@v1
    - name: Install swig and python3
      run: sudo apt install -y swig python3 python3-dev
    - name: Build python-swig bindings
      run: r2pm -r make -C python-swig
    - name: Run python-swig test
      run: r2pm -r make -C python-swig test
  go:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install r2
      uses: radareorg/github-actions@v1
    - name: Install go, swig, valac and valabind
      run: |
        sudo apt install -y golang swig valac libvala-dev
        r2pm -Uci valabind
    - name: Configure
      run: ./configure
    - name: Build go bindings
      run: r2pm -r make -C go
    - name: Run go hello world
      run: r2pm -r make -C go hello
    - name: Run r_bin test
      run: r2pm -r make -C go rbintest
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install r2
        uses: radareorg/github-actions@v1
      - name: Build
        run: cargo build
        working-directory: rust/r2api
      - name: Test (dynamic)
        run: cargo run
        working-directory: rust/r2api
      # Uncomment when radare2 pkg-config is no longer broken
      #- name: Test (static)
      #  run: cargo run --features=static
      #  working-directory: rust/r2api
  node-ffi:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Install r2
      uses: radareorg/github-actions@v1
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install swig, valac and valabind
      run: |
        sudo apt install -y swig valac libvala-dev
        r2pm -Uci valabind
    - name: Configure
      run: ./configure
    - name: Generate node-ffi bindings
      run: r2pm -r make -C node-ffi gen
    - name: Run node-ffi hello smoke test
      run: r2pm -r make -C node-ffi test
